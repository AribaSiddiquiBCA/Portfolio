<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin Smith | Portfolio</title>
    <style>
        :root {
            --bg-color: #111;
            --sidebar-bg: #1a1a1a;
            --accent-color: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100vh;
            width: 260px;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: var(--sidebar-bg);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            padding-top: 20px;
            border-right: 1px solid #333;
        }

        .profile-img {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-img img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            object-fit: cover;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links li a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dim);
            display: block;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .nav-links li a:hover, .nav-links li a.active {
            color: var(--accent-color);
            background: rgba(0, 212, 255, 0.05);
        }

        /* The "Stupid Code" Fix: Use a Button for Actions! */
        .closebtn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 30px;
            cursor: pointer;
            position: absolute;
            top: 10px;
            right: 20px;
            display: none; /* Hidden on desktop */
        }

        /* Main Content */
        .content {
            margin-left: 260px;
            padding: 60px;
            width: 100%;
        }

        .section-title {
            font-size: 3rem;
            opacity: 0.1;
            position: absolute;
            top: 20px;
            margin: 0;
        }

        .intro h3 { font-size: 2rem; }
        .intro span { color: var(--accent-color); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .stat-box {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }

        .stat-box h2 { margin: 0; color: var(--accent-color); }

        /* Mobile Trigger */
        .menu-trigger {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 25px;
            background: var(--accent-color);
            color: black;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Responsive Logic */
        @media screen and (max-width: 768px) {
            .sidebar { width: 0; }
            .content { margin-left: 0; padding: 40px 20px; }
            .menu-trigger { display: block; }
            .closebtn { display: block; }
        }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="openNav()">&#9776;</div>

    <nav class="sidebar" id="sidebar">
        <button class="closebtn" onclick="closeNav()">&times;</button>
        
        <div class="profile-img">
            <img src="https://via.placeholder.com/150" alt="Benjamin Smith">
        </div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#about" class="active">ABOUT ME</a></li>
            <li><a href="#resume">RESUME</a></li>
            <li><a href="#portfolio">PORTFOLIO</a></li>
            <li><a href="#testimonials">TESTIMONIALS</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
    </nav>

    <main class="content">
        <section id="about">
            <h1 class="section-title">ABOUT</h1>
            <div class="intro">
                <h3>I'm <span>Benjamin Smith</span></h3>
                <p>Graphic Designer / Photographer</p>
                <p>Helping brands stand out through clean aesthetics and powerful visual storytelling.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><h2>15+</h2><p>Years Exp.</p></div>
                <div class="stat-box"><h2>350+</h2><p>Projects</p></div>
                <div class="stat-box"><h2>200+</h2><p>Clients</p></div>
                <div class="stat-box"><h2>45K</h2><p>Followers</p></div>
            </div>
        </section>
    </main>

<script>
const sidebar = document.getElementById("sidebar");

function openNav() {
    sidebar.style.width = "260px";
}

function closeNav() {
    sidebar.style.width = "0";
}

// Close sidebar when clicking a link on mobile
document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        if (window.innerWidth <= 768) closeNav();
    });
});
</script>

</body>
</html>
